name: CI Pipeline

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore WeatherDress.sln

      - name: Build solution
        run: dotnet build WeatherDress.sln --configuration Release --no-restore

      - name: Run xUnit tests
        run: dotnet test tests/WeatherDress.UnitTests/WeatherDress.UnitTests.csproj --configuration Release --no-build --verbosity normal
